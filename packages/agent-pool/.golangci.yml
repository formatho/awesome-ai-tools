version: "2"

linters-settings:
  govet:
    disable:
      - fieldalignment
  staticcheck:
    checks:
      - all
      - -SA9003

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
  exclusions:
    paths:
      - vendor
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
