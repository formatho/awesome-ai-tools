hypotheses:
  - id: H0
    slug: initial-partnership-opportunities
    status: completed
    priority: 0
    description: Identify top blockchain/infrastructure partnerships that align with Formatho's privacy-first developer tools
    prediction: There are specific blockchain infrastructure partners (node providers, RPC services, L2s) with partnership programs targeting developer tools
    outcome: CONFIRMATORY - Literature review revealed 204 providers, 608 protocols, clear partnership opportunities
    learnings: Market is large (204 providers), high fragmentation, multiple partnership models exist (affiliate, integration, ecosystem grants)

  - id: H1
    slug: affiliate-revenue-model
    status: completed
    priority: 0
    description: Test affiliate/referral partnerships for fastest path to revenue
    prediction: Affiliate programs offer 10-70% commissions with 7-45 day cookie durations; first revenue achievable in 30 days
    outcome: CONFIRMATORY - Multiple viable affiliate programs identified
    learnings: Tatum (15% recurring, feasibility 9/10), Ankr (50% of fees, feasibility 8/10), Chainstack ($100 USDC per node, feasibility 7/10), QuickNode (PPS model, feasibility 6/10), Alchemy (no affiliate program). Privacy-first positioning is an opportunity as no provider emphasizes it.

  - id: H2
    slug: integration-partnership-model
    status: completed
    priority: 1
    description: Test strategic integration partnerships with top 3-5 infrastructure providers
    prediction: Deep integrations provide higher value (20-30% revenue share) but require 60-90 days
    outcome: CONFIRMATORY - All 3 providers (Tatum, Ankr, Chainstack) have formal partnership programs. Case studies show substantial benefits (400% ROI, 80% cost reduction). Revenue share not publicly disclosed; 60-90 day timeline likely. Too slow for 30-day goal.
    learnings: Integration partnerships offer co-marketing, custom infrastructure, dedicated support. Setup time (60-90 days) and revenue uncertainty make them secondary to affiliate programs for immediate revenue.

  - id: H3
    slug: privacy-first-positioning
    status: completed
    priority: 1
    description: Test privacy-first positioning as differentiator with privacy-conscious providers
    prediction: Privacy alignment enables premium positioning and exclusive partnerships
    outcome: EXPLORATORY - Privacy features exist in all major providers but are not positioned as primary differentiator. Privacy is embedded as security/compliance, not unique selling point. No evidence of premium pricing for privacy features (20-40% hypothesized). Market gap confirmed: no provider positions as "privacy-first".
    learnings: All 4 major providers (Chainstack, Alchemy, Consensys/Infura, QuickNode) have privacy features. Privacy features are standard (encryption, SOC 2, GDPR, zero-logging), not premium. Consensys/Infura has strongest privacy stance (does not collect private keys, proxy infrastructure, encrypted user-decryptable data). Market gap exists for "privacy-first developer tools" brand positioning. Privacy is valid differentiator but not premium-priced.
  - id: H4
    slug: ecosystem-grant-opportunities
    status: pending
    priority: 2
    description: Test L2 ecosystem grant programs (Base, Polygon, Arbitrum, Optimism)
    prediction: Ecosystem grants provide non-dilutive funding + visibility; application process 90-180 days
