name: Daily Refresh

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update statistics
        run: |
          echo "Updating tool statistics..."
          # Add statistics update logic here

      - name: Generate fresh README
        run: node scripts/generate_readme.mjs

      - name: Update badges
        run: |
          # Update "Last Updated" badge with current date
          TODAY=$(date +%Y-%m-%d)
          sed -i "s/Updated-[0-9-]*/Updated-${TODAY}/g" README.md

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: daily freshness update" && git push)

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Daily refresh workflow failed',
              body: 'The daily refresh workflow failed. Please check the logs:\n\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              labels: ['automation', 'bug']
            })
