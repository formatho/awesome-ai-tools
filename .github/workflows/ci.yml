name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.2
          working-directory: packages/llm-client
      
      - name: golangci-lint (agent-pool)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.2
          working-directory: packages/agent-pool
      
      - name: golangci-lint (agent-skills)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.2
          working-directory: packages/agent-skills
      
      - name: golangci-lint (todo-queue)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.2
          working-directory: packages/todo-queue
      
      - name: golangci-lint (cron-agents)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.2
          working-directory: packages/cron-agents
      
      - name: golangci-lint (agent-config)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.2
          working-directory: packages/agent-config
      
      - name: golangci-lint (backend)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.2
          working-directory: backend

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      
      - name: Run tests
        run: |
          # Test each module in the workspace
          for module in packages/*/; do
            if [ -f "${module}go.mod" ]; then
              echo "Testing ${module}..."
              cd ${module}
              CI=true go test -v -timeout 60s -coverprofile=coverage.out ./...
              if [ -f coverage.out ]; then
                mkdir -p ../../coverage
                cp coverage.out "../../coverage/$(basename ${module%/}).out"
              fi
              cd - > /dev/null
            fi
          done
      
      - name: Test backend module
        run: |
          echo "Testing backend..."
          cd backend
          CI=true go test -v -timeout 60s -coverprofile=coverage.out ./...
          mkdir -p ../../coverage
          cp coverage.out "../../coverage/backend.out"
      
      - name: Check coverage
        run: |
          # Check coverage for each module
          failed=0
          for cov_file in coverage/*.out; do
            if [ -f "$cov_file" ]; then
              module_name=$(basename ${cov_file%.out})
              coverage=$(go tool cover -func=${cov_file} 2>/dev/null | grep total | awk '{print $3}' | sed 's/%//')
              echo "${module_name} coverage: ${coverage}%"
              if [ ! -z "$coverage" ]; then
                if (( $(echo "$coverage < 70" | bc -l) )); then
                  echo "Warning: ${module_name} coverage ${coverage}% is below minimum 70%"
                  # Don't fail CI for now, just warn
                  # failed=1
                fi
              fi
            fi
          done
          if [ $failed -eq 1 ]; then
            exit 1
          fi
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      
      - name: Build
        run: |
          # Build each module in the workspace
          for module in packages/*/; do
            if [ -f "${module}go.mod" ]; then
              echo "Building ${module}..."
              cd ${module}
              go build -v ./...
              cd - > /dev/null
            fi
          done
