name: Build Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-app/package-lock.json

      - name: Cache Go dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Backend Dependencies
        working-directory: backend
        run: go mod download

      - name: Test Backend Build
        working-directory: backend
        run: go build -o bin/server ./cmd/server

      - name: Test Backend
        working-directory: backend
        run: go test ./... -v -timeout 60s

      - name: Install Frontend Dependencies
        working-directory: electron-app
        run: npm ci

      - name: Test Frontend Build
        working-directory: electron-app
        run: npm run build

      - name: Test Electron Build (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: electron-app
        run: npm run build:mac -- --dir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test Electron Build (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: electron-app
        run: npm run build:win -- --dir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test Electron Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: electron-app
        run: npm run build:linux -- --dir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: build-${{ matrix.os }}
          path: |
            electron-app/dist/
            electron-app/dist-electron/
            backend/bin/
          retention-days: 1
