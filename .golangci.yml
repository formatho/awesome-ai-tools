version: "2"

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters:
  enable:
    - errcheck      # Check for unchecked errors
    - gofmt         # Check formatting
    - goimports     # Check imports
    - govet         # Go vet
    - staticcheck   # Static analysis
    - ineffassign   # Detect unused assignments

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  
  gofmt:
    simplify: true
  
  goimports:
    local-prefixes: github.com/formatho
  
  govet:
    enable-all: true
  
  staticcheck:
    checks: ["all"]

issues:
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - errcheck
  
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
