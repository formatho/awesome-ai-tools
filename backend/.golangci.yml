version: "2"

linters-settings:
  govet:
    disable:
      - fieldalignment

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
  exclusions:
    paths:
      - vendor
      - third_party

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
